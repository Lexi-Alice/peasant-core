<div class="blessing-menu hidden">
  <div class="blessing-menu-handle window-header flexrow">
    <h4 class="window-title popup-handle-title">Blessings</h4>
    <button type="button" class="close-blessing header-control icon fa-solid fa-xmark" title="Close" aria-label="Close"></button>
  </div>

  <div style="display:flex; gap:8px; align-items:center; justify-content:space-between;">
    <label style="flex:1; font-size:12px;"><input type="checkbox" class="blessing-type-checkbox" name="blessingType" value="spring"> Blessing of Spring?</label>
    <label style="flex:1; font-size:12px;"><input type="checkbox" class="blessing-type-checkbox" name="blessingType" value="summer"> Blessing of Summer?</label>
  </div>
  <div style="display:flex; gap:8px; align-items:center; margin-top:6px; justify-content:space-between;">
    <label style="flex:1; font-size:12px;"><input type="checkbox" class="blessing-type-checkbox" name="blessingType" value="fall"> Blessing of Fall?</label>
    <label style="flex:1; font-size:12px;"><input type="checkbox" class="blessing-type-checkbox" name="blessingType" value="winter"> Blessing of Winter?</label>
  </div>
  <div style="display:flex; gap:8px; justify-content:flex-end; margin-top:8px;">
    <button type="button" class="apply-blessing">Apply</button>
    <button type="button" class="clear-blessing" style="margin-left:6px;">Clear</button>
  </div>
</div>
